<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CherryPet CMT8 - Inventory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F2F2F7; -webkit-tap-highlight-color: transparent; }
        .ios-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-radius: 12px; }
        .btn-primary { background: #007AFF; color: white; transition: opacity 0.2s; }
        .btn-primary:active { opacity: 0.6; }
        .btn-edit { color: #007AFF; }
        .btn-delete { color: #FF3B30; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20">

    <header class="sticky top-0 z-50 px-5 pt-10 pb-4 bg-white/70 backdrop-blur-md border-b border-gray-200">
        <h1 class="text-3xl font-bold text-gray-900">CherryPet CMT8</h1>
        <p class="text-sm text-gray-500">Quản lý kho chuyên nghiệp</p>
    </header>

    <div class="p-5 grid grid-cols-2 gap-4">
        <div class="ios-card p-4 shadow-sm border border-white">
            <p class="text-xs text-gray-500 uppercase font-semibold">Mặt hàng</p>
            <p id="total-items" class="text-2xl font-bold text-blue-600">0</p>
        </div>
        <div class="ios-card p-4 shadow-sm border border-white">
            <p class="text-xs text-gray-500 uppercase font-semibold">Sắp hết hàng</p>
            <p id="low-stock" class="text-2xl font-bold text-red-500">0</p>
        </div>
    </div>

    <main class="px-5">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-semibold text-gray-800">Danh sách kho</h2>
            <button onclick="openModal()" class="text-blue-600 font-medium">+ Thêm mới</button>
        </div>
        <div id="product-list" class="space-y-3"></div>
    </main>

    <div id="modal" class="hidden fixed inset-0 z-[100] bg-black/50 flex items-end">
        <div class="w-full bg-white rounded-t-2xl p-6 transition-all">
            <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-6"></div>
            <h3 id="modal-title" class="text-xl font-bold mb-4">Thêm sản phẩm</h3>
            <input type="hidden" id="edit-id">
            <div class="space-y-4">
                <input type="text" id="name" placeholder="Tên sản phẩm" class="w-full p-4 bg-gray-100 rounded-xl outline-none focus:ring-2 ring-blue-500 text-lg">
                <div class="flex gap-4">
                    <input type="text" id="price" placeholder="Giá bán" oninput="formatCurrency(this)" class="w-1/2 p-4 bg-gray-100 rounded-xl outline-none text-lg">
                    <input type="number" id="stock" placeholder="Số lượng" class="w-1/2 p-4 bg-gray-100 rounded-xl outline-none text-lg">
                </div>
                <button id="btn-save" onclick="saveProduct()" class="w-full btn-primary py-4 rounded-xl font-bold text-lg shadow-lg">Lưu dữ liệu</button>
                <button onclick="closeModal()" class="w-full py-2 text-gray-400">Hủy bỏ</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB8Wf1_UDl804EDFmEKFE5cZvjJSEfWVg8",
            authDomain: "xedua-86b46.firebaseapp.com",
            databaseURL: "https://xedua-86b46-default-rtdb.firebaseio.com",
            projectId: "xedua-86b46",
            storageBucket: "xedua-86b46.firebasestorage.app",
            messagingSenderId: "769715162274",
            appId: "1:769715162274:web:b85463e0bcffbefa841bfb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const inventoryRef = ref(db, 'inventory');

        // Định dạng tiền tệ khi nhập
        window.formatCurrency = (input) => {
            let value = input.value.replace(/\D/g, "");
            input.value = value.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        };

        // Lưu hoặc Cập nhật
        window.saveProduct = async () => {
            const id = document.getElementById('edit-id').value;
            const name = document.getElementById('name').value;
            const price = document.getElementById('price').value.replace(/\./g, "");
            const stock = document.getElementById('stock').value;

            if(name && price && stock) {
                const data = { name, price: parseInt(price), stock: parseInt(stock) };
                if(id) {
                    await update(ref(db, `inventory/${id}`), data);
                } else {
                    await push(inventoryRef, data);
                }
                closeModal();
            } else { alert("Vui lòng điền đủ thông tin!"); }
        };

        // Lấy dữ liệu hiển thị
        onValue(inventoryRef, (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('product-list');
            list.innerHTML = "";
            let count = 0, low = 0;

            if (data) {
                Object.keys(data).forEach(key => {
                    const item = data[key];
                    count++; if(item.stock < 5) low++;
                    const priceFormatted = new Intl.NumberFormat('vi-VN').format(item.price);

                    list.innerHTML += `
                        <div class="ios-card p-4 flex justify-between items-center shadow-sm border border-white">
                            <div onclick="editProduct('${key}', '${item.name}', '${item.price}', ${item.stock})">
                                <h4 class="font-bold text-gray-800 text-lg">${item.name}</h4>
                                <p class="text-sm text-gray-500">${priceFormatted}đ • Tồn kho: <span class="${item.stock < 5 ? 'text-red-500 font-bold' : ''}">${item.stock}</span></p>
                            </div>
                            <div class="flex gap-4">
                                <button onclick="editProduct('${key}', '${item.name}', '${item.price}', ${item.stock})" class="btn-edit">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                                </button>
                                <button onclick="deleteProduct('${key}')" class="btn-delete">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                </button>
                            </div>
                        </div>`;
                });
            }
            document.getElementById('total-items').innerText = count;
            document.getElementById('low-stock').innerText = low;
        });

        window.deleteProduct = (id) => { if(confirm("Xác nhận xóa mặt hàng này?")) remove(ref(db, `inventory/${id}`)); };

        window.editProduct = (id, name, price, stock) => {
            document.getElementById('modal-title').innerText = "Sửa sản phẩm";
            document.getElementById('edit-id').value = id;
            document.getElementById('name').value = name;
            document.getElementById('price').value = price.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            document.getElementById('stock').value = stock;
            openModal();
        };
    </script>

    <script>
        function openModal() { 
            document.getElementById('modal').classList.remove('hidden');
        }
        function closeModal() { 
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal-title').innerText = "Thêm sản phẩm";
            document.getElementById('edit-id').value = "";
            document.getElementById('name').value = "";
            document.getElementById('price').value = "";
            document.getElementById('stock').value = "";
        }
    </script>
</body>
</html>
