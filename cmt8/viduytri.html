<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Ví Tài Chính Pro - Gentle Pulse</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-blue: #007AFF;
            --ios-red: #FF3B30;
            --ios-green: #34C759;
            --ios-purple: #5856D6;
            --ios-gray: #8E8E93;
            --ios-separator: #E5E5EA;
            --safe-area-bottom: env(safe-area-inset-bottom, 20px);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--ios-bg);
            margin: 0;
            color: #000;
            overflow: hidden;
            height: 100vh;
        }

        /* --- DASHBOARD TRUNG TÂM --- */
        .dashboard {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .main-balance-label {
            font-size: 14px;
            color: var(--ios-gray);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        /* NHỊP ĐẬP NHẸ NHÀNG */
        .main-balance-value {
            font-size: 58px;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 5px;
            display: inline-block;
            animation: gentlePulse 3s infinite ease-in-out;
            transition: color 0.5s ease;
        }

        @keyframes gentlePulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 0px rgba(0,0,0,0)); }
            50% { transform: scale(1.08); filter: drop-shadow(0 0 15px currentColor); }
            100% { transform: scale(1); filter: drop-shadow(0 0 0px rgba(0,0,0,0)); }
        }

        .status-badge {
            font-size: 18px;
            font-weight: 800;
            padding: 6px 16px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
        }

        .status-profit { background: rgba(52, 199, 89, 0.1); color: var(--ios-green); border: 1.5px solid var(--ios-green); }
        .status-loss { background: rgba(255, 59, 48, 0.1); color: var(--ios-red); border: 1.5px solid var(--ios-red); }

        /* TỔNG THU TỔNG CHI */
        .stats-summary {
            display: flex;
            gap: 15px;
            margin-bottom: 35px;
        }
        .stat-box {
            background: var(--ios-card);
            padding: 10px 12px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            min-width: 85px;
        }
        .stat-label { font-size: 10px; color: var(--ios-gray); text-transform: uppercase; margin-bottom: 2px; }
        .stat-val { font-size: 14px; font-weight: 700; }

        /* NÚT BẤM */
        .action-grid {
            display: flex;
            gap: 25px;
            margin-bottom: 50px;
        }
        .btn-action {
            width: 70px; height: 70px; border-radius: 35px; border: none;
            display: flex; align-items: center; justify-content: center; color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); transition: all 0.2s; cursor: pointer;
        }
        .btn-action:active { transform: scale(0.85); opacity: 0.8; }
        .btn-thu { background: linear-gradient(145deg, #34C759, #28a745); }
        .btn-chi { background: linear-gradient(145deg, #FF3B30, #d93025); }
        .btn-quy { background: linear-gradient(145deg, #5856D6, #4644b6); }

        /* SLIDE SHEETS */
        .slide-sheet {
            position: fixed; bottom: 0; left: 0; right: 0; height: 85vh;
            background: var(--ios-card); border-radius: 30px 30px 0 0;
            box-shadow: 0 -15px 50px rgba(0,0,0,0.15); z-index: 2000;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; flex-direction: column;
        }
        .slide-sheet.open { transform: translateY(0); }
        .sheet-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid var(--ios-separator); }
        .sheet-handle { width: 40px; height: 5px; background: #D1D1D6; border-radius: 3px; margin: 10px auto; }
        .sheet-content { flex: 1; overflow-y: auto; padding: 10px 20px 40px 20px; }

        .bottom-triggers {
            position: fixed; bottom: calc(30px + var(--safe-area-bottom));
            display: flex; gap: 50px; justify-content: center; width: 100%; left: 0;
        }
        .history-trigger { display: flex; flex-direction: column; align-items: center; color: var(--ios-blue); cursor: pointer; font-weight: 600; font-size: 13px; gap: 8px; }
        .daily-item { padding: 18px; background: #F9F9F9; border-radius: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        /* FORM OVERLAY */
        #inputOverlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); z-index: 3000; opacity: 0; visibility: hidden; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        #inputOverlay.show { opacity: 1; visibility: visible; }
        .form-card { width: 90%; max-width: 350px; background: #fff; border-radius: 28px; padding: 30px; transform: scale(0.8); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #inputOverlay.show .form-card { transform: scale(1); }
        input, textarea { width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 15px; border: 1px solid #E5E5EA; background: #F2F2F7; font-size: 16px; box-sizing: border-box; outline: none; }
        #saveBtn, .btn-block { width: 100%; padding: 16px; border-radius: 15px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; box-sizing: border-box; }
        #saveBtn { background: var(--ios-blue); color: #fff; }
        .btn-block:active { transform: scale(0.96); opacity: 0.9; }
        .detail-row { padding: 15px 0; border-bottom: 0.5px solid var(--ios-separator); display: flex; justify-content: space-between; align-items: center; }

        /* THÀNH PHẦN QUỸ */
        .fund-card { background: linear-gradient(135deg, #5856D6, #4644b6); color: white; padding: 25px; border-radius: 24px; text-align: center; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(88, 86, 214, 0.2); }
        .fund-title { font-size: 14px; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .fund-amount { font-size: 38px; font-weight: 800; }
        
        /* CẬP NHẬT ĐỂ HIỂN THỊ RÕ NÚT TRÊN NỀN TRẮNG */
        .fund-actions { display: flex; gap: 15px; margin-bottom: 25px; }
        .btn-fund-out { background: var(--ios-purple); color: white; box-shadow: 0 4px 12px rgba(88, 86, 214, 0.3); }
        .btn-fund-in { background: rgba(88, 86, 214, 0.1); color: var(--ios-purple); border: 1px solid rgba(88, 86, 214, 0.2); }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="main-balance-label">Số dư hiện tại</div>
        <div id="sodu-value" class="main-balance-value">0 đ</div>
        
        <div id="status-badge" class="status-badge">
            <span id="status-text">...</span>
            <span id="loi-lo-value">0 đ</span>
        </div>

        <div class="stats-summary">
            <div class="stat-box">
                <div class="stat-label">Tổng Thu</div>
                <div id="sum-thu" class="stat-val" style="color:var(--ios-green)">0 đ</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Tổng Chi</div>
                <div id="sum-chi" class="stat-val" style="color:var(--ios-red)">0 đ</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Trong Quỹ</div>
                <div id="sum-quy" class="stat-val" style="color:var(--ios-purple)">0 đ</div>
            </div>
        </div>

        <div class="action-grid">
            <button class="btn-action btn-thu" onclick="openForm('thu')">
                <i data-lucide="plus" style="width: 34px; height: 34px;"></i>
            </button>
            <button class="btn-action btn-chi" onclick="openForm('chi')">
                <i data-lucide="minus" style="width: 34px; height: 34px;"></i>
            </button>
            <button class="btn-action btn-quy" onclick="toggleFund(true)">
                <i data-lucide="wallet" style="width: 32px; height: 32px;"></i>
            </button>
        </div>

        <div class="bottom-triggers">
            <div class="history-trigger" onclick="toggleHistory(true)">
                <i data-lucide="layout-list" style="width: 28px; height: 28px;"></i>
                LỊCH SỬ GIAO DỊCH
            </div>
        </div>
    </div>

    <div id="historySheet" class="slide-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
            <h3 style="margin:0">Lịch sử giao dịch</h3>
            <button onclick="toggleHistory(false)" style="border:none; background:none; color:var(--ios-blue); font-size: 16px; font-weight: 600;">Đóng</button>
        </div>
        <div class="sheet-content" id="historyContent"></div>
    </div>

    <div id="fundSheet" class="slide-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
            <h3 style="margin:0">Quỹ Dự Phòng (20%)</h3>
            <button onclick="toggleFund(false)" style="border:none; background:none; color:var(--ios-blue); font-size: 16px; font-weight: 600;">Đóng</button>
        </div>
        <div class="sheet-content">
            <div class="fund-card">
                <div class="fund-title">Tổng tích lũy quỹ</div>
                <div id="fund-total" class="fund-amount">0 đ</div>
            </div>

            <div class="fund-actions">
                <button class="btn-block btn-fund-out" id="btn-rut-20" onclick="extractToFund()">
                    Rút 20% về quỹ<br><span id="suggested-20-amt" style="font-size:11px; font-weight:normal; opacity:0.85;">(0 đ)</span>
                </button>
                <button class="btn-block btn-fund-in" onclick="openFundDepositForm()">
                    Nạp lại ví chính
                </button>
            </div>

            <h4 style="margin: 20px 0 10px 0; color: var(--ios-gray); font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px;">Lịch sử biến động quỹ</h4>
            <div id="fundHistoryContent"></div>
        </div>
    </div>

    <div id="detailSheet" class="slide-sheet" style="z-index: 2100;">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
            <button onclick="toggleDetail(false)" style="border:none; background:none; color:var(--ios-blue); display:flex; align-items:center; gap:5px; font-size: 16px; font-weight: 600;">
                <i data-lucide="chevron-left"></i> Quay lại
            </button>
            <h3 id="detailDateTitle" style="margin:0">Ngày</h3>
            <div style="width:60px"></div>
        </div>
        <div class="sheet-content" id="detailContent"></div>
    </div>

    <div id="inputOverlay" onclick="if(event.target === this) closeForm()">
        <div class="form-card">
            <h2 id="formTitle" style="margin-top:0; text-align:center"></h2>
            <input type="date" id="ngay">
            <input type="text" id="sotien" placeholder="0" oninput="formatNumber(this)" inputmode="numeric">
            <textarea id="chitiet" placeholder="Ghi chú nội dung..."></textarea>
            <button id="saveBtn" onclick="saveData()">XÁC NHẬN LƯU</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB8uLkLJFlzmCodcawJhs2dRckHQzO5y10",
            authDomain: "chitieu-7263e.firebaseapp.com",
            databaseURL: "https://chitieu-7263e-default-rtdb.firebaseio.com",
            projectId: "chitieu-7263e",
            storageBucket: "chitieu-7263e.firebasestorage.app",
            messagingSenderId: "83833140682",
            appId: "1:83833140682:web:f9254b418ace3a659fcb33",
            measurementId: "G-523X74K18N"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const lichsuRef = ref(db, "vi/lichsu");

        lucide.createIcons();
        window.fullDataStore = {};
        let currentWalletBalance = 0;
        let currentFundBalance = 0;

        window.toggleHistory = (open) => document.getElementById('historySheet').classList.toggle('open', open);
        window.toggleFund = (open) => document.getElementById('fundSheet').classList.toggle('open', open);
        window.toggleDetail = (open) => document.getElementById('detailSheet').classList.toggle('open', open);

        window.formatNumber = (input) => {
            let value = input.value.replace(/\D/g, '');
            if (value) {
                input.setAttribute('data-val', value);
                input.value = Number(value).toLocaleString('vi-VN') + " đ";
            }
        };

        window.openForm = (type) => {
            window.currentType = type;
            if (type === 'thu') {
                document.getElementById('formTitle').innerHTML = '<span style="color:var(--ios-green)">THU NHẬP</span>';
            } else if (type === 'chi') {
                document.getElementById('formTitle').innerHTML = '<span style="color:var(--ios-red)">CHI TIÊU</span>';
            } else if (type === 'nap_tu_quy') {
                document.getElementById('formTitle').innerHTML = '<span style="color:var(--ios-purple)">NẠP LẠI VÍ CHÍNH</span>';
            }
            document.getElementById('ngay').value = new Date().toISOString().split('T')[0];
            document.getElementById('inputOverlay').classList.add('show');
        };

        window.openFundDepositForm = () => {
            if (currentFundBalance <= 0) {
                alert("Quỹ hiện tại không có tiền để nạp lại!");
                return;
            }
            window.openForm('nap_tu_quy');
        };

        window.closeForm = () => document.getElementById('inputOverlay').classList.remove('show');

        window.saveData = () => {
            const sotien = Number(document.getElementById('sotien').getAttribute('data-val') || 0);
            const ngay = document.getElementById('ngay').value;
            const chitiet = document.getElementById('chitiet').value;
            if (!sotien) return;

            if (window.currentType === 'nap_tu_quy' && sotien > currentFundBalance) {
                alert("Số tiền vượt quá số dư hiện tại của Quỹ!");
                return;
            }

            push(lichsuRef, { loai: window.currentType, ngay, sotien, chitiet, time: Date.now() })
            .then(() => { 
                closeForm(); 
                document.getElementById('sotien').value = ""; 
                document.getElementById('chitiet').value = "";
                document.getElementById('sotien').removeAttribute('data-val');
            });
        };

        window.extractToFund = () => {
            const amountToExtract = Math.floor(currentWalletBalance * 0.2);
            if (amountToExtract <= 0) {
                alert("Số dư hiện tại không đủ (phải lớn hơn 0 đ) để trích 20% về quỹ!");
                return;
            }

            if (confirm(`Bạn muốn rút 20% số dư (${amountToExtract.toLocaleString('vi-VN')} đ) về Quỹ dự phòng?`)) {
                const today = new Date().toISOString().split('T')[0];
                push(lichsuRef, {
                    loai: 'trich_quy',
                    ngay: today,
                    sotien: amountToExtract,
                    chitiet: "Trích 20% từ số dư hiện tại vào quỹ dự phòng",
                    time: Date.now()
                }).then(() => {
                    alert(`Đã trích thành công ${amountToExtract.toLocaleString('vi-VN')} đ vào quỹ!`);
                });
            }
        };

        window.showDayDetail = (date) => {
            const items = window.fullDataStore[date] || [];
            const container = document.getElementById("detailContent");
            document.getElementById("detailDateTitle").innerText = date.split('-').reverse().join('/');
            let html = "";
            items.forEach(item => {
                let label = 'Biến động';
                let color = '#000';
                let prefix = '';

                if (item.loai === 'thu') { label = 'Thu'; color = 'var(--ios-green)'; prefix = '+'; }
                else if (item.loai === 'chi') { label = 'Chi'; color = 'var(--ios-red)'; prefix = '-'; }
                else if (item.loai === 'trich_quy') { label = 'Trích Quỹ (Ra)'; color = 'var(--ios-red)'; prefix = '-'; }
                else if (item.loai === 'nap_tu_quy') { label = 'Nạp từ Quỹ (Vào)'; color = 'var(--ios-green)'; prefix = '+'; }

                html += `<div class="detail-row">
                    <div><div style="font-weight:700">${label}</div><div style="font-size:13px; color:gray">${item.chitiet || '...'}</div></div>
                    <div style="font-weight:700; color:${color}">${prefix}${item.sotien.toLocaleString('vi-VN')}</div>
                </div>`;
            });
            container.innerHTML = html;
            toggleDetail(true);
            lucide.createIcons();
        };

        onValue(lichsuRef, snapshot => {
            const data = snapshot.val();
            const historyContent = document.getElementById("historyContent");
            const fundHistoryContent = document.getElementById("fundHistoryContent");
            
            let totalRevenue = 0, totalExpense = 0, totalFund = 0;
            window.fullDataStore = {};
            let fundItems = [];

            if (data) {
                const sortedRaw = Object.values(data).sort((a,b) => a.time - b.time);
                
                sortedRaw.forEach(item => {
                    if (!window.fullDataStore[item.ngay]) window.fullDataStore[item.ngay] = [];
                    window.fullDataStore[item.ngay].push(item);
                    
                    if (item.loai === 'thu') {
                        totalRevenue += item.sotien;
                    } else if (item.loai === 'chi') {
                        totalExpense += item.sotien;
                    } else if (item.loai === 'trich_quy') {
                        totalExpense += item.sotien;
                        totalFund += item.sotien;
                        fundItems.push(item);
                    } else if (item.loai === 'nap_tu_quy') {
                        totalRevenue += item.sotien;
                        totalFund -= item.sotien;
                        fundItems.push(item);
                    }
                });
            }

            currentWalletBalance = totalRevenue - totalExpense;
            currentFundBalance = totalFund;

            // Cập nhật giao diện chính
            document.getElementById("sodu-value").innerText = currentWalletBalance.toLocaleString('vi-VN') + " đ";
            document.getElementById("loi-lo-value").innerText = Math.abs(currentWalletBalance).toLocaleString('vi-VN') + " đ";
            document.getElementById("sum-thu").innerText = totalRevenue.toLocaleString('vi-VN') + " đ";
            document.getElementById("sum-chi").innerText = totalExpense.toLocaleString('vi-VN') + " đ";
            document.getElementById("sum-quy").innerText = currentFundBalance.toLocaleString('vi-VN') + " đ";
            
            // Cập nhật giao diện quỹ
            document.getElementById("fund-total").innerText = currentFundBalance.toLocaleString('vi-VN') + " đ";
            const current20Suggested = currentWalletBalance > 0 ? Math.floor(currentWalletBalance * 0.2) : 0;
            document.getElementById("suggested-20-amt").innerText = `(${current20Suggested.toLocaleString('vi-VN')} đ)`;

            const soduEl = document.getElementById("sodu-value");
            const badgeEl = document.getElementById("status-badge");
            const statusTxt = document.getElementById("status-text");

            if (currentWalletBalance >= 0) {
                soduEl.style.color = "var(--ios-green)";
                statusTxt.innerText = "LỜI";
                badgeEl.className = "status-badge status-profit";
            } else {
                soduEl.style.color = "var(--ios-red)";
                statusTxt.innerText = "LỖ";
                badgeEl.className = "status-badge status-loss";
            }

            // Giao diện lịch sử tổng hợp theo ngày
            let html = "";
            const sortedDates = Object.keys(window.fullDataStore).sort((a,b) => new Date(b) - new Date(a));
            sortedDates.forEach(date => {
                const items = window.fullDataStore[date];
                const dThu = items.filter(i => i.loai === 'thu' || i.loai === 'nap_tu_quy').reduce((s, i) => s + i.sotien, 0);
                const dChi = items.filter(i => i.loai === 'chi' || i.loai === 'trich_quy').reduce((s, i) => s + i.sotien, 0);
                html += `<div class="daily-item" onclick="showDayDetail('${date}')">
                    <div class="item-date">${date.split('-').reverse().join('/')}</div>
                    <div style="text-align:right">
                        <div style="color:var(--ios-green); font-size:13px">+${dThu.toLocaleString('vi-VN')}</div>
                        <div style="color:var(--ios-red); font-size:13px">-${dChi.toLocaleString('vi-VN')}</div>
                    </div>
                    <i data-lucide="chevron-right" style="width:16px; color:#C7C7CC"></i>
                </div>`;
            });
            historyContent.innerHTML = html || "<p style='text-align:center; color:gray'>Chưa có dữ liệu</p>";

            // Giao diện lịch sử của Quỹ
            let fundHtml = "";
            fundItems.reverse().forEach(fItem => {
                const isNạpVàoQuỹ = fItem.loai === 'trich_quy';
                fundHtml += `<div class="detail-row">
                    <div>
                        <div style="font-weight:700">${isNạpVàoQuỹ ? 'Trích vào Quỹ (+)' : 'Nạp lại Ví chính (-)'}</div>
                        <div style="font-size:12px; color:gray">${fItem.ngay.split('-').reverse().join('/')} - ${fItem.chitiet || ''}</div>
                    </div>
                    <div style="font-weight:700; color:${isNạpVàoQuỹ ? 'var(--ios-green)' : 'var(--ios-red)'}">
                        ${isNạpVàoQuỹ ? '+' : '-'}${fItem.sotien.toLocaleString('vi-VN')}
                    </div>
                </div>`;
            });
            fundHistoryContent.innerHTML = fundHtml || "<p style='text-align:center; color:gray; font-size:14px; margin-top:15px;'>Chưa có biến động quỹ</p>";

            lucide.createIcons();
        });
    </script>
</body>
</html>
