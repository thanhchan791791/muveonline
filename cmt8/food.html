<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cherrypet - Pet Food POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: #F2F2F7;
        }
        .ios-blur {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid rgba(0,0,0,0.1);
        }
        .product-card {
            background: white;
            border-radius: 24px;
            transition: all 0.2s ease;
            border: 1px solid rgba(0,0,0,0.03);
        }
        .product-card:active {
            transform: scale(0.96);
            background-color: #E5E5EA;
        }
        .modal-bg {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
        }
        .ios-sheet {
            border-radius: 30px 30px 0 0;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ios-sheet.active {
            transform: translateY(0);
        }
        ::-webkit-scrollbar { display: none; }
        
        /* Hiệu ứng logo */
        .logo-container img {
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="ios-blur sticky top-0 z-40 px-6 pt-10 pb-5">
        <div class="flex flex-col items-center mb-4">
            <div class="logo-container mb-2">
                <img src="logocherry.png" alt="Cherrypet Logo" class="h-16 w-auto object-contain">
            </div>
            <div class="flex justify-between items-center w-full">
                <h1 class="text-xl font-extrabold tracking-tight text-black italic">THỨC ĂN PET 🐾</h1>
                <span id="order-count-badge" class="bg-orange-500 text-white text-[10px] font-black px-2 py-0.5 rounded-full shadow-lg shadow-orange-200">0</span>
            </div>
        </div>
        
        <div>
            <input type="text" id="search-pet" oninput="renderPetMenu()" placeholder="Tìm đồ ăn cho bé..." 
                class="w-full bg-[#E3E3E6] border-none rounded-2xl px-5 py-3 text-sm font-semibold outline-none focus:ring-2 focus:ring-orange-400 transition-all">
        </div>
    </header>

    <main id="pet-grid" class="flex-1 overflow-y-auto px-6 py-6 grid grid-cols-2 gap-4 pb-72">
        </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t border-slate-100 px-6 pt-4 pb-8 shadow-[0_-10px_40px_rgba(0,0,0,0.08)] z-30">
        <div id="mini-cart" class="max-h-36 overflow-y-auto mb-4 space-y-2 border-b border-slate-50 pb-4 hidden">
            </div>

        <div class="flex justify-between items-end mb-4">
            <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Tổng thanh toán</p>
                <div id="total-val" class="text-3xl font-black text-slate-900 tracking-tighter">0đ</div>
            </div>
            <button onclick="clearOrder()" class="text-red-500 font-bold text-xs px-4 py-2 bg-red-50 rounded-full active:bg-red-100">XÓA HẾT</button>
        </div>
        <button onclick="openPaymentSheet()" class="w-full bg-slate-900 text-white py-4 rounded-[22px] font-black text-lg shadow-xl active:scale-95 transition-all uppercase tracking-tight">
            THANH TOÁN
        </button>
    </footer>

    <div id="payment-modal" class="fixed inset-0 z-[60] modal-bg hidden opacity-0 transition-opacity duration-300">
        <div class="absolute inset-0" onclick="closePaymentSheet()"></div>
        <div id="payment-sheet" class="ios-sheet absolute bottom-0 left-0 right-0 bg-white p-8">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
            <h3 class="text-center text-xl font-black text-slate-900 mb-8 uppercase italic">Phương thức thanh toán</h3>
            <div class="grid gap-4 mb-6">
                <button onclick="submitOrder('Tiền mặt')" class="w-full bg-orange-500 text-white py-5 rounded-2xl font-black text-xl shadow-lg shadow-orange-100 active:scale-95 transition-all">TIỀN MẶT</button>
                <button onclick="submitOrder('Chuyển khoản')" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg shadow-blue-100 active:scale-95 transition-all">CHUYỂN KHOẢN</button>
            </div>
            <button onclick="closePaymentSheet()" class="w-full py-2 text-slate-400 font-bold uppercase text-[11px] tracking-widest">Quay lại</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB8Wf1_UDl804EDFmEKFE5cZvjJSEfWVg8",
            authDomain: "xedua-86b46.firebaseapp.com",
            databaseURL: "https://xedua-86b46-default-rtdb.firebaseio.com",
            projectId: "xedua-86b46",
            storageBucket: "xedua-86b46.firebasestorage.app",
            messagingSenderId: "769715162274",
            appId: "1:769715162274:web:b85463e0bcffbefa841bfb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let categories = {}, allItems = [], cart = [];

        onValue(ref(db, 'categories'), s => { categories = s.val() || {}; });
        onValue(ref(db, 'menu'), s => {
            const data = s.val() ? Object.values(s.val()) : [];
            allItems = data.filter(item => {
                const catName = (categories[item.categoryId]?.name || "").toLowerCase();
                return catName.includes('pet') || catName.includes('thức ăn') || catName.includes('hạt') || catName.includes('cát');
            });
            renderPetMenu();
        });

        function renderPetMenu() {
            const grid = document.getElementById('pet-grid');
            const search = document.getElementById('search-pet').value.toLowerCase();
            grid.innerHTML = '';
            allItems.filter(i => i.name.toLowerCase().includes(search)).forEach(item => {
                const card = document.createElement('div');
                card.className = "product-card p-5 flex flex-col justify-between h-44 shadow-sm";
                card.onclick = () => addToCart(item);
                card.innerHTML = `
                    <div class="space-y-1">
                        <div class="text-[9px] font-black text-orange-500 uppercase tracking-tighter">${categories[item.categoryId]?.name || 'Pet'}</div>
                        <div class="text-[15px] font-extrabold text-slate-800 leading-tight line-clamp-3">${item.name}</div>
                    </div>
                    <div class="text-lg font-black text-slate-900">${Number(item.price).toLocaleString()}đ</div>
                `;
                grid.appendChild(card);
            });
        }

        window.addToCart = (item) => {
            const exists = cart.find(i => i.name === item.name);
            if(exists) exists.quantity++;
            else cart.push({...item, quantity: 1});
            updateUI();
            if(navigator.vibrate) navigator.vibrate(15);
        };

        window.updateQty = (index, delta) => {
            cart[index].quantity += delta;
            if (cart[index].quantity <= 0) cart.splice(index, 1);
            updateUI();
        };

        function updateUI() {
            const total = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
            const count = cart.reduce((s, i) => s + i.quantity, 0);
            document.getElementById('total-val').innerText = total.toLocaleString() + 'đ';
            document.getElementById('order-count-badge').innerText = count;

            const miniCart = document.getElementById('mini-cart');
            if (cart.length > 0) {
                miniCart.classList.remove('hidden');
                miniCart.innerHTML = cart.map((item, index) => `
                    <div class="flex justify-between items-center bg-white border border-slate-100 p-3 rounded-2xl shadow-sm">
                        <div class="flex-1 pr-2">
                            <div class="text-[13px] font-extrabold text-slate-800 truncate">${item.name}</div>
                            <div class="text-[11px] font-semibold text-slate-400">${Number(item.price).toLocaleString()}đ</div>
                        </div>
                        <div class="flex items-center gap-3">
                            <button onclick="updateQty(${index}, -1)" class="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center font-black text-slate-600 active:bg-slate-200 transition-colors">-</button>
                            <span class="text-sm font-black w-4 text-center text-slate-900">${item.quantity}</span>
                            <button onclick="updateQty(${index}, 1)" class="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center font-black text-slate-600 active:bg-slate-200 transition-colors">+</button>
                        </div>
                    </div>
                `).join('');
            } else {
                miniCart.classList.add('hidden');
            }
        }

        window.clearOrder = () => { if(confirm("Xóa toàn bộ giỏ hàng?")) { cart = []; updateUI(); } };

        window.openPaymentSheet = () => {
            if(!cart.length) return;
            const modal = document.getElementById('payment-modal');
            const sheet = document.getElementById('payment-sheet');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.add('opacity-100'); sheet.classList.add('active'); }, 10);
        };

        window.closePaymentSheet = () => {
            const modal = document.getElementById('payment-modal');
            const sheet = document.getElementById('payment-sheet');
            modal.classList.remove('opacity-100'); sheet.classList.remove('active');
            setTimeout(() => modal.classList.add('hidden'), 300);
        };

        window.submitOrder = async (method) => {
            try {
                const orderRef = push(ref(db, 'orders'));
                const now = new Date();
                const total = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
                const orderData = {
                    orderId: orderRef.key.slice(-6).toUpperCase(),
                    items: cart,
                    financials: { subtotal: total, totalFinal: total, discount: {amount:0}, vat: {amount:0} },
                    payment: { method: method, status: "Completed" },
                    timestamp: Date.now(),
                    dateString: now.toLocaleDateString('vi-VN'),
                    timeString: now.toLocaleTimeString('vi-VN')
                };
                await set(orderRef, orderData);
                closePaymentSheet();
                alert(`Đã hoàn tất! Mã đơn #${orderData.orderId}`);
                cart = [];
                updateUI();
                document.getElementById('search-pet').value = '';
                renderPetMenu();
            } catch (e) { alert("Lỗi hệ thống: " + e.message); }
        };
    </script>
</body>
</html>
