<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cherrypet - POS Bar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: #F2F2F7;
        }
        .ios-blur {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid rgba(0,0,0,0.1);
        }
        .product-card {
            background: white;
            border-radius: 24px;
            transition: all 0.2s ease;
            border: 1px solid rgba(0,0,0,0.03);
        }
        .product-card:active {
            transform: scale(0.96);
            background-color: #E5E5EA;
        }
        .modal-bg {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
        }
        .ios-sheet {
            border-radius: 30px 30px 0 0;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ios-sheet.active {
            transform: translateY(0);
        }
        ::-webkit-scrollbar { display: none; }

        /* Vô hiệu hóa nút khi đang xử lý */
        button:disabled {
            opacity: 0.6;
            pointer-events: none;
            filter: grayscale(1);
        }

        @media print {
            body * { visibility: hidden; }
            #print-section {
                display: block !important;
                visibility: visible !important;
                position: absolute;
                left: 0;
                top: 0;
                width: 80mm;
                background: white;
            }
            #print-section * { 
                visibility: visible !important;
                font-weight: 700;
                color: black !important;
            }
            #print-logo { filter: contrast(1.5); }
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="ios-blur sticky top-0 z-40 px-6 pt-10 pb-5">
        <div class="flex justify-between items-start mb-4">
            <button onclick="openReport()" class="bg-white/80 px-3 py-2 rounded-xl text-[10px] font-black shadow-sm border border-slate-100 flex items-center gap-1">
                📊 THỐNG KÊ QUẦY BAR
            </button>
            <div class="logo-container">
                <img src="logocherry.png" alt="Logo" class="h-12 w-auto object-contain">
            </div>
        </div>
        
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-extrabold tracking-tight text-black italic uppercase">Order Quầy Bar 🐾</h1>
            <span id="order-count-badge" class="bg-orange-500 text-white text-[10px] font-black px-2 py-0.5 rounded-full shadow-lg shadow-orange-200">0</span>
        </div>
        
        <div class="space-y-4">
            <input type="text" id="search-pet" oninput="renderPetMenu()" placeholder="Tìm món nhanh..." 
                class="w-full bg-[#E3E3E6] border-none rounded-2xl px-5 py-3 text-sm font-semibold outline-none focus:ring-2 focus:ring-orange-400">
            
            <div id="category-list" class="flex gap-2 overflow-x-auto pb-1 no-scrollbar">
                <button onclick="filterByCategory('all')" id="cat-all" class="category-pill active bg-black text-white px-4 py-2 rounded-xl text-xs font-bold shadow-sm">Tất cả</button>
            </div>
        </div>
    </header>

    <main id="pet-grid" class="flex-1 overflow-y-auto px-6 py-6 grid grid-cols-2 gap-4 pb-72">
    </main>

    <div id="print-section" class="hidden"></div>

    <footer class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t border-slate-100 px-6 pt-4 pb-8 shadow-2xl z-30">
        <div id="mini-cart" class="max-h-36 overflow-y-auto mb-4 space-y-2 border-b border-slate-50 pb-4 hidden"></div>
        <div class="flex justify-between items-end mb-4">
            <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Tổng tiền</p>
                <div id="total-val" class="text-3xl font-black text-slate-900 tracking-tighter">0đ</div>
            </div>
            <button onclick="clearOrder()" class="text-red-500 font-bold text-xs px-4 py-2 bg-red-50 rounded-full active:bg-red-100">XÓA HẾT</button>
        </div>
        <button onclick="openPaymentSheet()" class="w-full bg-slate-900 text-white py-4 rounded-[22px] font-black text-lg shadow-xl active:scale-95 transition-all uppercase">THANH TOÁN</button>
    </footer>

    <div id="payment-modal" class="fixed inset-0 z-[60] modal-bg hidden opacity-0 transition-opacity duration-300">
        <div class="absolute inset-0" onclick="closePaymentSheet()"></div>
        <div id="payment-sheet" class="ios-sheet absolute bottom-0 left-0 right-0 bg-white p-8">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
            <h3 class="text-center text-xl font-black text-slate-900 mb-8 uppercase italic">Chọn phương thức</h3>
            <div class="grid gap-4">
                <button id="btn-cash" onclick="submitOrder('Tiền mặt')" class="btn-pay w-full bg-orange-500 text-white py-5 rounded-2xl font-black text-xl shadow-lg active:scale-95">TIỀN MẶT</button>
                <button id="btn-transfer" onclick="submitOrder('Chuyển khoản')" class="btn-pay w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg active:scale-95">CHUYỂN KHOẢN</button>
            </div>
            <button id="btn-close-payment" onclick="closePaymentSheet()" class="w-full py-6 text-slate-400 font-bold uppercase text-[11px] tracking-widest">Đóng</button>
        </div>
    </div>

    <div id="report-modal" class="fixed inset-0 z-[70] modal-bg hidden opacity-0 transition-opacity duration-300">
        <div class="absolute inset-0" onclick="closeReport()"></div>
        <div id="report-sheet" class="ios-sheet absolute bottom-0 left-0 right-0 bg-[#F2F2F7] p-6 h-[90vh] overflow-y-auto">
            <div class="w-12 h-1.5 bg-slate-300 rounded-full mx-auto mb-6"></div>
            <h3 class="text-xl font-black text-slate-900 mb-6 uppercase italic">Thống kê Quầy Bar</h3>
            
            <div class="space-y-3 mb-6">
                <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Tổng Doanh Thu</p>
                    <div id="report-total" class="text-3xl font-black text-slate-900 tracking-tighter">0đ</div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white rounded-3xl p-4 shadow-sm border border-slate-100">
                        <p class="text-[9px] font-bold text-orange-500 uppercase">Tiền mặt</p>
                        <div id="report-cash" class="text-lg font-black text-slate-800">0đ</div>
                    </div>
                    <div class="bg-white rounded-3xl p-4 shadow-sm border border-slate-100">
                        <p class="text-[9px] font-bold text-blue-500 uppercase">Chuyển khoản</p>
                        <div id="report-transfer" class="text-lg font-black text-slate-800">0đ</div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-6 text-[10px] font-black uppercase">
                <button onclick="loadReport('today')" class="bg-slate-900 text-white py-3 rounded-xl">Hôm nay</button>
                <button onclick="loadReport('7days')" class="bg-white text-slate-900 py-3 rounded-xl border border-slate-200">7 Ngày qua</button>
            </div>

            <div class="bg-white rounded-3xl p-4 shadow-sm mb-6 text-center">
                <div class="flex gap-2 mb-2">
                    <input type="date" id="date-from" class="bg-slate-100 p-2 rounded-lg text-xs font-bold w-1/2 outline-none">
                    <input type="date" id="date-to" class="bg-slate-100 p-2 rounded-lg text-xs font-bold w-1/2 outline-none">
                </div>
                <button onclick="loadReport('custom')" class="w-full bg-slate-100 py-2 rounded-lg font-bold text-[10px] uppercase">Lọc theo ngày</button>
            </div>

            <h4 class="text-xs font-black text-slate-400 uppercase mb-3 px-1">Danh sách hóa đơn</h4>
            <div id="order-list" class="space-y-3 mb-10"></div>
            <button onclick="closeReport()" class="w-full py-8 text-slate-400 font-bold uppercase text-[10px] tracking-widest text-center">Quay lại</button>
        </div>
    </div>

    <div id="detail-modal" class="fixed inset-0 z-[80] modal-bg hidden opacity-0 transition-opacity duration-300 flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[32px] p-6 shadow-2xl relative">
            <button onclick="closeDetail()" class="absolute top-4 right-4 text-slate-300">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
            <h3 class="text-xl font-black mb-4 uppercase italic" id="detail-id">CHI TIẾT</h3>
            <div id="detail-content" class="space-y-3 mb-6 max-h-60 overflow-y-auto pr-2"></div>
            <div class="border-t pt-4 border-slate-100">
                <div class="flex justify-between font-black text-lg">
                    <span>TỔNG CỘNG</span>
                    <span id="detail-total" class="text-orange-500">0đ</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB8Wf1_UDl804EDFmEKFE5cZvjJSEfWVg8",
            authDomain: "xedua-86b46.firebaseapp.com",
            databaseURL: "https://xedua-86b46-default-rtdb.firebaseio.com",
            projectId: "xedua-86b46",
            storageBucket: "xedua-86b46.firebasestorage.app",
            messagingSenderId: "769715162274",
            appId: "1:769715162274:web:b85463e0bcffbefa841bfb"
        };

        const TELE_TOKEN = "8581857488:AAGFtZdA3NecouzR8YaJsH0eVKEFlGZ2fB0";
        const TELE_CHAT_ID = "-5177888655";

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let categories = {}, allItems = [], cart = [], currentCategory = 'all';

        onValue(ref(db, 'categories'), s => { categories = s.val() || {}; renderCategories(); });
        onValue(ref(db, 'menu'), s => { allItems = s.val() ? Object.values(s.val()) : []; renderPetMenu(); });

        function renderCategories() {
            const container = document.getElementById('category-list');
            container.innerHTML = `<button onclick="window.filterByCategory('all')" id="cat-all" class="category-pill active bg-black text-white px-4 py-2 rounded-xl text-xs font-bold shadow-sm">Tất cả</button>`;
            Object.keys(categories).forEach(id => {
                const btn = document.createElement('button');
                btn.id = `cat-${id}`;
                btn.className = "category-pill bg-white px-4 py-2 rounded-xl text-xs font-bold shadow-sm border border-slate-100";
                btn.innerText = categories[id].name;
                btn.onclick = () => window.filterByCategory(id);
                container.appendChild(btn);
            });
        }

        window.filterByCategory = (id) => {
            currentCategory = id;
            document.querySelectorAll('.category-pill').forEach(btn => btn.classList.remove('active', 'bg-black', 'text-white'));
            const activeBtn = document.getElementById(`cat-${id}`);
            if(activeBtn) activeBtn.classList.add('active', 'bg-black', 'text-white');
            renderPetMenu();
        };

        window.renderPetMenu = () => {
            const grid = document.getElementById('pet-grid');
            const search = document.getElementById('search-pet').value.toLowerCase();
            grid.innerHTML = '';
            let filtered = currentCategory !== 'all' ? allItems.filter(i => i.categoryId === currentCategory) : allItems;
            filtered.filter(i => i.name.toLowerCase().includes(search)).forEach(item => {
                const card = document.createElement('div');
                card.className = "product-card p-5 flex flex-col justify-between h-44 shadow-sm";
                card.onclick = () => addToCart(item);
                card.innerHTML = `
                    <div class="space-y-1">
                        <div class="text-[9px] font-black text-orange-500 uppercase tracking-tighter">${categories[item.categoryId]?.name || 'Pet'}</div>
                        <div class="text-[15px] font-extrabold text-slate-800 leading-tight line-clamp-3">${item.name}</div>
                    </div>
                    <div class="text-lg font-black text-slate-900">${Number(item.price).toLocaleString()}đ</div>
                `;
                grid.appendChild(card);
            });
        };

        window.addToCart = (item) => {
            const exists = cart.find(i => i.name === item.name);
            if(exists) exists.quantity++;
            else cart.push({...item, quantity: 1});
            updateUI();
        };

        window.updateQty = (index, delta) => {
            cart[index].quantity += delta;
            if (cart[index].quantity <= 0) cart.splice(index, 1);
            updateUI();
        };

        function updateUI() {
            const total = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
            document.getElementById('total-val').innerText = total.toLocaleString() + 'đ';
            document.getElementById('order-count-badge').innerText = cart.reduce((s, i) => s + i.quantity, 0);
            const miniCart = document.getElementById('mini-cart');
            if (cart.length > 0) {
                miniCart.classList.remove('hidden');
                miniCart.innerHTML = cart.map((item, index) => `
                    <div class="flex justify-between items-center bg-white border border-slate-100 p-3 rounded-2xl shadow-sm">
                        <div class="flex-1 pr-2"><div class="text-[13px] font-extrabold text-slate-800 truncate">${item.name}</div></div>
                        <div class="flex items-center gap-3">
                            <button onclick="updateQty(${index}, -1)" class="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center font-black">-</button>
                            <span class="text-sm font-black w-4 text-center">${item.quantity}</span>
                            <button onclick="updateQty(${index}, 1)" class="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center font-black">+</button>
                        </div>
                    </div>
                `).join('');
            } else miniCart.classList.add('hidden');
        }

        window.clearOrder = () => { if(confirm("Xóa giỏ?")) { cart = []; updateUI(); } };

        window.openPaymentSheet = () => {
            if(!cart.length) return;
            // Reset trạng thái nút mỗi khi mở lại màn hình thanh toán
            togglePaymentButtons(false);
            const modal = document.getElementById('payment-modal');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.add('opacity-100'); document.getElementById('payment-sheet').classList.add('active'); }, 10);
        };

        window.closePaymentSheet = () => {
            const modal = document.getElementById('payment-modal');
            document.getElementById('payment-sheet').classList.remove('active');
            modal.classList.remove('opacity-100');
            setTimeout(() => modal.classList.add('hidden'), 300);
        };

        // Hàm bật/tắt nút thanh toán để chống lặp đơn
        function togglePaymentButtons(isDisabled) {
            const buttons = document.querySelectorAll('.btn-pay');
            const closeBtn = document.getElementById('btn-close-payment');
            buttons.forEach(btn => {
                btn.disabled = isDisabled;
                if (isDisabled) {
                    btn.setAttribute('data-old-text', btn.innerText);
                    btn.innerText = "ĐANG XỬ LÝ...";
                } else if (btn.getAttribute('data-old-text')) {
                    btn.innerText = btn.getAttribute('data-old-text');
                }
            });
            if (closeBtn) closeBtn.disabled = isDisabled;
        }

        // THỐNG KÊ CHI TIẾT
        window.openReport = () => {
            const modal = document.getElementById('report-modal');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.add('opacity-100'); document.getElementById('report-sheet').classList.add('active'); }, 10);
            loadReport('today');
        };

        window.closeReport = () => {
            const modal = document.getElementById('report-modal');
            document.getElementById('report-sheet').classList.remove('active');
            modal.classList.remove('opacity-100');
            setTimeout(() => modal.classList.add('hidden'), 300);
        };

        window.loadReport = async (type) => {
            const snapshot = await get(ref(db, 'orders'));
            if (!snapshot.exists()) return;

            let totalRev = 0, cash = 0, transfer = 0;
            const now = new Date();
            let start, end;

            if (type === 'today') {
                start = new Date(now.setHours(0,0,0,0)).getTime();
                end = new Date(now.setHours(23,59,59,999)).getTime();
            } else if (type === '7days') {
                start = new Date(now.setDate(now.getDate() - 7)).getTime();
                end = Date.now();
            } else {
                start = new Date(document.getElementById('date-from').value).setHours(0,0,0,0);
                end = new Date(document.getElementById('date-to').value).setHours(23,59,59,999);
            }

            const orders = Object.values(snapshot.val())
                .filter(o => o.location === "Quầy bar" && o.timestamp >= start && o.timestamp <= end)
                .sort((a, b) => b.timestamp - a.timestamp);

            orders.forEach(order => {
                totalRev += order.financials.totalFinal;
                if (order.payment.method === "Tiền mặt") cash += order.financials.totalFinal;
                else transfer += order.financials.totalFinal;
            });

            document.getElementById('report-total').innerText = totalRev.toLocaleString() + 'đ';
            document.getElementById('report-cash').innerText = cash.toLocaleString() + 'đ';
            document.getElementById('report-transfer').innerText = transfer.toLocaleString() + 'đ';

            const listContainer = document.getElementById('order-list');
            listContainer.innerHTML = orders.map(o => `
                <div onclick='showDetail(${JSON.stringify(o)})' class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm active:scale-95 transition-all">
                    <div>
                        <div class="text-xs font-black text-slate-800">#${o.orderId}</div>
                        <div class="text-[9px] font-bold text-slate-400">${o.timeString} - ${o.payment.method}</div>
                    </div>
                    <div class="text-sm font-black text-slate-900">${o.financials.totalFinal.toLocaleString()}đ</div>
                </div>
            `).join('');
        };

        window.showDetail = (order) => {
            const modal = document.getElementById('detail-modal');
            document.getElementById('detail-id').innerText = `Đơn #${order.orderId}`;
            document.getElementById('detail-total').innerText = order.financials.totalFinal.toLocaleString() + 'đ';
            document.getElementById('detail-content').innerHTML = order.items.map(i => `
                <div class="flex justify-between items-center border-b border-slate-50 pb-2">
                    <div class="flex-1 pr-4">
                        <div class="text-sm font-black text-slate-800">${i.name}</div>
                        <div class="text-[10px] font-bold text-slate-400">Số lượng: ${i.quantity}</div>
                    </div>
                    <div class="text-sm font-bold text-slate-900">${(i.price * i.quantity).toLocaleString()}đ</div>
                </div>
            `).join('');
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.add('opacity-100'), 10);
        };

        window.closeDetail = () => {
            const modal = document.getElementById('detail-modal');
            modal.classList.remove('opacity-100');
            setTimeout(() => modal.classList.add('hidden'), 300);
        };

        function printBill(orderData) {
            const printSection = document.getElementById('print-section');
            let itemsHtml = orderData.items.map(item => `
                <div style="display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 15px; font-weight: 800;">
                    <span style="flex: 2;">${item.name}</span>
                    <span style="flex: 0.5; text-align: center;">${item.quantity}</span>
                    <span style="flex: 1; text-align: right;">${(item.price * item.quantity).toLocaleString()}</span>
                </div>
            `).join('');

            printSection.innerHTML = `
                <div style="text-align: center; font-family: 'Inter', sans-serif; padding: 10px; width: 75mm; margin: 0 auto; color: black; background: white;">
                    <img id="print-logo" src="logocherry.png" style="width: 80px; margin: 0 auto;">
                    <h2 style="margin: 10px 0 5px 0; font-size: 20px; font-weight: 900;">CHERRYPET COFFEE 2</h2>
                    <p style="font-size: 12px; margin: 0; font-weight: 700;">285/94A Hẻm 285 Cách Mạng Tháng Tám, P12, Q10, HCM</p>
                    <p style="font-size: 12px; margin: 2px 0 10px 0; font-weight: 700;">SĐT: 0902 539 186</p>
                    <div style="border-top: 2px solid black; margin: 10px 0;"></div>
                    <div style="display: flex; justify-content: space-between; font-size: 12px; font-weight: 900; margin-bottom: 10px;">
                        <span>ĐƠN: #${orderData.orderId}</span>
                        <span>${orderData.timeString} ${orderData.dateString}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 13px; font-weight: 900; border-bottom: 2px solid black; padding-bottom: 5px; margin-bottom: 5px;">
                        <span style="flex: 2;">SẢN PHẨM</span>
                        <span style="flex: 0.5; text-align: center;">SL</span>
                        <span style="flex: 1; text-align: right;">T.TIỀN</span>
                    </div>
                    ${itemsHtml}
                    <div style="border-top: 1.5px dotted black; margin: 10px 0;"></div>
                    <div style="text-align: right; font-size: 14px; font-weight: 800;">
                        <p>Tạm tính: <b>${orderData.financials.subtotal.toLocaleString()}đ</b></p>
                        <h3 style="font-size: 22px; font-weight: 1000; margin: 10px 0;">TỔNG: ${orderData.financials.totalFinal.toLocaleString()}đ</h3>
                        <p style="font-size: 12px; font-style: italic;">PTTT: ${orderData.payment.method.toUpperCase()} | Bar</p>
                    </div>
                    <div style="border-top: 2px dashed black; margin: 15px 0 10px 0;"></div>
                    <p style="font-size: 13px; font-weight: 900;">*** CẢM ƠN & HẸN GẶP LẠI ***</p>
                </div>
            `;
            setTimeout(() => { window.print(); }, 400);
        }

        window.submitOrder = async (method) => {
            try {
                // KHÓA NÚT NGAY LẬP TỨC
                togglePaymentButtons(true);

                const orderRef = push(ref(db, 'orders'));
                const now = new Date();
                const total = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
                const orderData = {
                    orderId: orderRef.key.slice(-6).toUpperCase(),
                    source: "Bar order",
                    location: "Quầy bar",
                    items: [...cart],
                    financials: { subtotal: total, totalFinal: total },
                    payment: { method: method, status: "Completed" },
                    timestamp: Date.now(),
                    dateString: now.toLocaleDateString('vi-VN'),
                    timeString: now.toLocaleTimeString('vi-VN')
                };
                
                await set(orderRef, orderData);
                printBill(orderData);
                
                fetch(`https://api.telegram.org/bot${TELE_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELE_CHAT_ID, text: `💰 BAR: +${total.toLocaleString()}đ\n🆔 #${orderData.orderId}\n💳 ${method}`, parse_mode: 'Markdown' })
                });

                closePaymentSheet();
                cart = [];
                updateUI();
                document.getElementById('search-pet').value = '';
                window.filterByCategory('all');
                
            } catch (e) { 
                alert("Lỗi: " + e.message); 
                // Nếu lỗi thì mở khóa lại nút để nhân viên thử lại
                togglePaymentButtons(false);
            }
        };
    </script>
</body>
</html>
